<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1600" height="900" fill="#87c9e8"/>

  <!-- Mountains -->
  <polygon points="200,700 600,300 1000,700" fill="#5a3e36"/>
  <polygon points="400,700 800,350 1200,700" fill="#6b4a41"/>

  <!-- Volcano -->
  <polygon points="600,700 800,200 1000,700" fill="#3b2a25"/>

  <!-- Lava streams -->
  <path d="M800 200 C780 350, 750 450, 720 700" stroke="#ff3c00" stroke-width="20" fill="none"/>
  <path d="M800 200 C820 350, 850 500, 900 700" stroke="#ff6a00" stroke-width="25" fill="none"/>

  <!-- Lava lake -->
  <ellipse cx="800" cy="780" rx="500" ry="100" fill="#ff3c00"/>
  <ellipse cx="800" cy="780" rx="400" ry="70" fill="#ff7a00"/>

  <!-- Jungle simple -->
  <circle cx="200" cy="650" r="80" fill="#2e8b57"/>
  <circle cx="1400" cy="650" r="80" fill="#2e8b57"/>

</svg>
